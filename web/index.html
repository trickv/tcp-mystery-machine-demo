<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>V9N Voyager 1 Emulator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0e14;
      --fg: #c5d1e0;
      --accent: #ff9f43;
      --dim: #6c7a89;
      --box: #151b24;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100%;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 12px 18px 10px;
      border-bottom: 1px solid #1f2733;
      display: flex;
      align-items: baseline;
      gap: 14px;
      flex-wrap: wrap;
    }
    header h1 {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
      color: var(--accent);
      letter-spacing: 0.05em;
    }
    header .meta {
      font-size: 12px;
      color: var(--dim);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    header .status {
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      margin-left: auto;
    }
    header .status::before {
      content: "●";
      margin-right: 6px;
      color: var(--dim);
    }
    header .status.open::before { color: #7ed321; }
    header .status.err::before { color: #ff4d4f; }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    #terminal {
      flex: 1;
      min-height: 0;
      padding: 10px 14px 6px;
    }
    footer {
      padding: 8px 18px 12px;
      border-top: 1px solid #1f2733;
      font-size: 12px;
      color: var(--dim);
      display: flex;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }
    footer .hint code {
      color: var(--fg);
      background: var(--box);
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 12px;
    }
    footer a {
      color: var(--accent);
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>V9N VOYAGER 1 EMULATOR</h1>
    <span class="meta">voyager1.v9n.us:4242 (via websocket bridge)</span>
    <span class="status" id="status">connecting…</span>
  </header>
  <main>
    <div id="terminal"></div>
  </main>
  <footer>
    <div class="hint">
      no <code>HELP</code>, no <code>?</code>, no menu. try <code>STATUS</code>.
      full command grammar:
      <a href="https://github.com/trickv/tcp-mystery-machine-demo/blob/master/skills/voyager-probe/reference/commands.md" target="_blank" rel="noopener">commands.md</a>
    </div>
    <div>
      <a href="https://github.com/trickv/tcp-mystery-machine-demo" target="_blank" rel="noopener">github ↗</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="./terminal.js"></script>
</body>
</html>
